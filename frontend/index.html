<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EthioBingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; background: #0d0d1f; }
      body { overflow: hidden; }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(243,156,18,0.6); }
        70%  { box-shadow: 0 0 0 8px rgba(243,156,18,0); }
        100% { box-shadow: 0 0 0 0 rgba(243,156,18,0); }
      }
      @keyframes glow {
        0%, 100% { box-shadow: 0 5px 20px rgba(231,76,60,0.5); }
        50%       { box-shadow: 0 5px 30px rgba(231,76,60,0.8); }
      }

      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      ::-webkit-scrollbar { display: none; }
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
